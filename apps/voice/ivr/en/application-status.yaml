kind: UDCSP.Voice.Dialog
version: 1
locale: en
id: application-status
prompts:
  normal: "Please say or enter your case number. Press star to repeat or zero for an agent."
  slowSpeech: "Please say or enter your case number. Press star to repeat or zero for an agent."
bargeIn: true
dtmfFallback:
  '*': repeat
  '0': escalate_to_agent
  '1': residency
  '2': tax_certificate
  '3': child_benefit
noInput:
  retries: 2
  then: escalate_to_agent
noMatch:
  retries: 2
  then: escalate_to_agent
