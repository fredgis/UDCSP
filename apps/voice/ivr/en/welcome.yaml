kind: UDCSP.Voice.Dialog
version: 1
locale: en
id: welcome
prompts:
  normal: "Welcome to Unified Digital Citizen Services. I can help you with residency, tax, child benefit, and other government services across Denmark, Sweden, and Norway. What can I do for you today?"
  slowSpeech: "Welcome to Unified Digital Citizen Services. I can help with residency, tax, child benefit, and other government services. Please ask me your question — for example: how do I get a tax residency certificate, or, am I eligible for child benefit."
bargeIn: true
dtmfFallback:
  '*': repeat
  '0': escalate_to_agent
  '1': residency
  '2': tax_certificate
  '3': child_benefit
noInput:
  retries: 2
  then: escalate_to_agent
noMatch:
  retries: 2
  then: escalate_to_agent
