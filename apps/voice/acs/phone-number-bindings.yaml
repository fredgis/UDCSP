# Generated/maintained by apps/voice/scripts/Bind-AcsNumber.ps1 — see docs/biz/voice.md §9.4.
# Each entry binds a regulator-issued PSTN number to the country ACS resource and to the
# voice orchestrator's IncomingCall webhook. Install-Voice reads this file at install
# time so the operator does not have to repeat the bind step on every redeploy.
#
# IMPORTANT — the entries below are PLACEHOLDERS for the case-study demo. They satisfy
# the recipe smoke flow (Test-Voice executes the orchestrator healthz against the
# publicHostname for each country) without requiring real PSTN procurement. Once a real
# regulator-issued number is provisioned, replace the corresponding placeholder line by
# running:
#   pwsh apps/voice/scripts/Bind-AcsNumber.ps1 `
#     -Country dk -Env dev -PhoneNumber '+4570701234' `
#     -AcsResourceName udcsp-dk-acs -ResourceGroup udcsp-dk-voice `
#     -OrchestratorFqdn voice-dk.udcsp.dk -NumberType tollFree
# The script overwrites the matching placeholder line in this file in-place.
bindings:
  - country: dk
    env: dev
    phoneNumber: '+4570000000'           # placeholder — replace with regulator-issued DK toll-free
    numberType: tollFree
    acsResource: udcsp-dk-acs
    inboundWebhook: https://voice-dk.udcsp.dk/api/acs/eventgrid
    placeholder: true
  - country: se
    env: dev
    phoneNumber: '+4620000000'           # placeholder — replace with regulator-issued SE toll-free
    numberType: tollFree
    acsResource: udcsp-se-acs
    inboundWebhook: https://voice-se.udcsp.se/api/acs/eventgrid
    placeholder: true
  - country: no
    env: dev
    phoneNumber: '+4780000000'           # placeholder — replace with regulator-issued NO toll-free
    numberType: tollFree
    acsResource: udcsp-no-acs
    inboundWebhook: https://voice-no.udcsp.no/api/acs/eventgrid
    placeholder: true
  - country: no
    env: dev
    phoneNumber: +4620000000
    numberType: tollFree
    acsResource: udcsp-no-acs
    inboundWebhook: https://udcsp-no-dev-voice-orch.happysand-65f2a633.norwayeast.azurecontainerapps.io/api/acs/eventgrid
    boundAt: 2026-05-16T14:29:54Z
