kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: escalate-to-human
  intent:
    displayName: Escalate To Human
    triggerQueries:
      - language: da
        text: "escalate to human (da)"
      - language: sv
        text: "escalate to human (sv)"
      - language: nb
        text: "escalate to human (nb)"
      - language: nn
        text: "escalate to human (nn)"
      - language: se
        text: "escalate to human (se)"
      - language: en
        text: "escalate to human (en)"
      - language: de
        text: "escalate to human (de)"
      - language: fr
        text: "escalate to human (fr)"
      - language: pl
        text: "escalate to human (pl)"
      - language: ar
        text: "escalate to human (ar)"
      - language: uk
        text: "escalate to human (uk)"
      - language: fi
        text: "escalate to human (fi)"
actions:
  - kind: InvokeConnector
    connector: foundry-classifier
    input: =turn.activity.text
  - kind: InvokeConnector
    connector: foundry-citizen-assistant
    input: =turn.activity.text
  - kind: SendActivity
    text: =Topic.Answer
