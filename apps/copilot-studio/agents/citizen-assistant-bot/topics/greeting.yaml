kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: greeting
  intent:
    displayName: Greeting
    triggerQueries:
      - language: da
        text: "greeting (da)"
      - language: sv
        text: "greeting (sv)"
      - language: nb
        text: "greeting (nb)"
      - language: nn
        text: "greeting (nn)"
      - language: se
        text: "greeting (se)"
      - language: en
        text: "greeting (en)"
      - language: de
        text: "greeting (de)"
      - language: fr
        text: "greeting (fr)"
      - language: pl
        text: "greeting (pl)"
      - language: ar
        text: "greeting (ar)"
      - language: uk
        text: "greeting (uk)"
      - language: fi
        text: "greeting (fi)"
actions:
  - kind: InvokeConnector
    connector: foundry-classifier
    input: =turn.activity.text
  - kind: InvokeConnector
    connector: foundry-citizen-assistant
    input: =turn.activity.text
  - kind: SendActivity
    text: =Topic.Answer
