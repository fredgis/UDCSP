kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: tax-certificate-request
  intent:
    displayName: Tax Certificate Request
    triggerQueries:
      - language: da
        text: "tax certificate request (da)"
      - language: sv
        text: "tax certificate request (sv)"
      - language: nb
        text: "tax certificate request (nb)"
      - language: nn
        text: "tax certificate request (nn)"
      - language: se
        text: "tax certificate request (se)"
      - language: en
        text: "tax certificate request (en)"
      - language: de
        text: "tax certificate request (de)"
      - language: fr
        text: "tax certificate request (fr)"
      - language: pl
        text: "tax certificate request (pl)"
      - language: ar
        text: "tax certificate request (ar)"
      - language: uk
        text: "tax certificate request (uk)"
      - language: fi
        text: "tax certificate request (fi)"
actions:
  - kind: InvokeConnector
    connector: foundry-classifier
    input: =turn.activity.text
  - kind: InvokeConnector
    connector: foundry-citizen-assistant
    input: =turn.activity.text
  - kind: SendActivity
    text: =Topic.Answer
