kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: accessibility-help
  intent:
    displayName: Accessibility Help
    triggerQueries:
      - language: da
        text: "accessibility help (da)"
      - language: sv
        text: "accessibility help (sv)"
      - language: nb
        text: "accessibility help (nb)"
      - language: nn
        text: "accessibility help (nn)"
      - language: se
        text: "accessibility help (se)"
      - language: en
        text: "accessibility help (en)"
      - language: de
        text: "accessibility help (de)"
      - language: fr
        text: "accessibility help (fr)"
      - language: pl
        text: "accessibility help (pl)"
      - language: ar
        text: "accessibility help (ar)"
      - language: uk
        text: "accessibility help (uk)"
      - language: fi
        text: "accessibility help (fi)"
actions:
  - kind: InvokeConnector
    connector: foundry-classifier
    input: =turn.activity.text
  - kind: InvokeConnector
    connector: foundry-citizen-assistant
    input: =turn.activity.text
  - kind: SendActivity
    text: =Topic.Answer
