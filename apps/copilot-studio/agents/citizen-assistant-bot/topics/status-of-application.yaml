kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: status-of-application
  intent:
    displayName: Status Of Application
    triggerQueries:
      - language: da
        text: "status of application (da)"
      - language: sv
        text: "status of application (sv)"
      - language: nb
        text: "status of application (nb)"
      - language: nn
        text: "status of application (nn)"
      - language: se
        text: "status of application (se)"
      - language: en
        text: "status of application (en)"
      - language: de
        text: "status of application (de)"
      - language: fr
        text: "status of application (fr)"
      - language: pl
        text: "status of application (pl)"
      - language: ar
        text: "status of application (ar)"
      - language: uk
        text: "status of application (uk)"
      - language: fi
        text: "status of application (fi)"
actions:
  - kind: InvokeConnector
    connector: foundry-classifier
    input: =turn.activity.text
  - kind: InvokeConnector
    connector: foundry-citizen-assistant
    input: =turn.activity.text
  - kind: SendActivity
    text: =Topic.Answer
