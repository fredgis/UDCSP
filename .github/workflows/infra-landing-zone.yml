name: infra-landing-zone

on:
  pull_request:
    paths:
      - 'infra/landing-zone/**'
  push:
    branches: [ main ]
    paths:
      - 'infra/landing-zone/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - country: dk
            location: northeurope
          - country: se
            location: swedencentral
          - country: no
            location: norwayeast
    environment: ${{ matrix.country }}-prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }} # TODO: case-study scaffold — replace with real values when deploying
          tenant-id: ${{ secrets.AZURE_TENANT_ID }} # TODO: case-study scaffold — replace with real values when deploying
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} # TODO: case-study scaffold — replace with real values when deploying
      - name: What-if
        run: az deployment sub what-if --location ${{ matrix.location }} --template-file infra/landing-zone/main.bicep --parameters infra/landing-zone/parameters/${{ matrix.country }}.bicepparam
      - name: Deploy on merge
        if: github.event_name == 'push'
        run: az deployment sub create --location ${{ matrix.location }} --template-file infra/landing-zone/main.bicep --parameters infra/landing-zone/parameters/${{ matrix.country }}.bicepparam
