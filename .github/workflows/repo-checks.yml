name: udcsp-repo-checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-and-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: .github/markdown-link-check.json

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: 'foundry/ tests/eval/ governance/ai-act/ governance/priva/'
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable

  bicep-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bicep lint
        run: |
          az bicep upgrade
          find infra services data governance apps -name "*.bicep" -print0 | xargs -0 -I {} az bicep build --file {} --stdout > /dev/null
          echo "Bicep lint OK"
