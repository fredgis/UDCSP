name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: presentation/package-lock.json

      - name: Install dependencies
        working-directory: presentation
        run: npm ci

      - name: Build slides as HTML (without speaker notes)
        working-directory: presentation
        run: |
          node -e "const fs=require('fs');let s=fs.readFileSync('slides.md','utf8');s=s.replace(/<!--(?!\s*_)[\s\S]*?-->/g,'');fs.writeFileSync('slides.pages.md',s);"
          npx @marp-team/marp-cli --theme theme.css --html --allow-local-files slides.pages.md -o _site/index.html
          cp -r images _site/images

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
