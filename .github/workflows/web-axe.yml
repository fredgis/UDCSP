name: web-axe

on:
  push:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-axe.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-axe.yml'
  workflow_dispatch:

jobs:
  axe:
    name: axe-core (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Lint (jsx-a11y rules included)
        run: npm run lint

      - name: Component a11y tests (vitest + axe-core)
        run: npm run test:a11y

      - name: Build
        run: npm run build

      - name: Serve dist
        run: |
          npx --yes http-server dist -p 4173 -s &
          npx --yes wait-on http://127.0.0.1:4173

      - name: axe-core CLI scan
        run: |
          npx --yes @axe-core/cli@4.10.0 \
            http://127.0.0.1:4173/ \
            http://127.0.0.1:4173/login \
            http://127.0.0.1:4173/demos \
            http://127.0.0.1:4173/consent \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa \
            --exit
