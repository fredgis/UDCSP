name: udcsp-installer-validate

on:
  push:
    paths:
      - 'scripts/install/**'
      - '.github/workflows/installer-validate.yml'
  pull_request:
    paths:
      - 'scripts/install/**'
  workflow_dispatch:

jobs:
  pwsh-syntax:
    name: PowerShell syntax + module load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path scripts -Recurse -Include *.ps1,*.psm1 | ForEach-Object {
            $tokens = $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs) { $errors += "$($_.FullName) :: $($errs | Out-String)" }
          }
          if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          Write-Host "PowerShell syntax OK"

      - name: Importable modules
        shell: pwsh
        run: |
          Get-ChildItem scripts/install/modules/*.psm1 | ForEach-Object {
            Import-Module $_.FullName -Force -DisableNameChecking
            Write-Host "Loaded: $($_.Name)"
          }

      - name: Installer dry-run (TestOnly)
        shell: pwsh
        run: |
          Copy-Item scripts/install/config/udcsp.config.template.psd1 scripts/install/config/udcsp.config.psd1
          ./scripts/install/Install-UDCSP.ps1 -Environment dev -TestOnly
