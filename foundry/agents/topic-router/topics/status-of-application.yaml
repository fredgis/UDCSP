kind: FoundrySkillPrompt
id: status-of-application
displayName: Status Of Application
source: apps/copilot-studio/agents/citizen-assistant-bot/topics/status-of-application.yaml
triggerPatterns:
    - language: da
      text: "status of application (da)"
    - language: sv
      text: "status of application (sv)"
    - language: nb
      text: "status of application (nb)"
    - language: nn
      text: "status of application (nn)"
    - language: se
      text: "status of application (se)"
    - language: en
      text: "status of application (en)"
    - language: de
      text: "status of application (de)"
    - language: fr
      text: "status of application (fr)"
    - language: pl
      text: "status of application (pl)"
    - language: ar
      text: "status of application (ar)"
    - language: uk
      text: "status of application (uk)"
    - language: fi
      text: "status of application (fi)"
slots:
  include: slot-definitions.yaml
route:
  tools: [invoke_classifier, invoke_citizen_assistant, escalate_to_d365]
skillPrompt: >-
  Collect country, serviceType, application reference, and channel; explain secure lookup requirements; escalate if status lookup requires a caseworker.
responseContract:
  response: localized citizen-facing text
  nextAction: route, ask_slot, answer, upload_document, pre_assess, or escalate
  escalationReason: null unless escalation-rules.json applies
