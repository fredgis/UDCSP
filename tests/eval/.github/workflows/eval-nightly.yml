name: A14 Foundry Eval Nightly
on: { workflow_dispatch: {}, schedule: [{ cron: "20 1 * * *" }] }
jobs:
  eval:
    runs-on: ubuntu-latest
    strategy: { matrix: { pipeline: [nightly-classifier, nightly-translator, nightly-eligibility, nightly-assistant] } }
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: tests/eval/scripts/Run-Eval-Pipeline.ps1 -Pipeline ${{ matrix.pipeline }}
        env: { FOUNDRY_PROJECT_ENDPOINT: '${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}' }
