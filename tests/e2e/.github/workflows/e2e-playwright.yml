name: A14 E2E Playwright
on:
  workflow_dispatch:
  pull_request:
    paths: ['tests/e2e/**', 'apps/**', 'services/apim/**', 'foundry/**']
jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy: { fail-fast: false, matrix: { project: [chromium, firefox, webkit, mobile-chrome, mobile-safari, a11y] } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: tests/e2e/package.json }
      - run: npm ci
        working-directory: tests/e2e
      - run: npx playwright install --with-deps
        working-directory: tests/e2e
      - run: npx playwright test --project=${{ matrix.project }}
        working-directory: tests/e2e
        env: { UDCSP_WEB_BASE_URL: '${{ vars.UDCSP_WEB_BASE_URL }}', UDCSP_TEST_TOKEN: '${{ secrets.UDCSP_TEST_TOKEN }}' }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ matrix.project }}
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
