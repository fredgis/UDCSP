name: A14 Accessibility Gate
on:
  workflow_dispatch:
  pull_request: { paths: ['tests/accessibility/**', 'tests/e2e/**', 'apps/web/**'] }
jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci && npx playwright install --with-deps chromium
        working-directory: tests/e2e
      - run: npx playwright test --project=a11y ../accessibility/automated/axe-runner.spec.ts
        working-directory: tests/e2e
        env: { UDCSP_WEB_BASE_URL: '${{ vars.UDCSP_WEB_BASE_URL }}' }
