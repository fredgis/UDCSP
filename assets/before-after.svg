<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,'Apple Color Emoji','Segoe UI Emoji',sans-serif"
     role="img"
     aria-label="UDCSP transformation: from 47 fragmented portals and 28-day decisions today, to 1 federated platform with 4-day decisions, 12 languages and full accessibility tomorrow.">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A237E" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1A237E" flood-opacity="0.22"/>
    </filter>

    <linearGradient id="g-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF5F5"/>
      <stop offset="1" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="g-after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1F8E9"/>
      <stop offset="1" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="g-header-before" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D32F2F"/>
      <stop offset="1" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="g-header-after" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#388E3C"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="g-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1565C0"/>
      <stop offset="0.5" stop-color="#5E35B1"/>
      <stop offset="1" stop-color="#00897B"/>
    </linearGradient>

    <clipPath id="clip-card-before"><rect x="40" y="30" width="460" height="400" rx="28"/></clipPath>
    <clipPath id="clip-card-after"><rect x="700" y="30" width="460" height="400" rx="28"/></clipPath>
  </defs>

  <!-- BEFORE CARD -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="460" height="400" rx="28" fill="url(#g-before)" stroke="#C62828" stroke-width="2"/>
  </g>
  <g clip-path="url(#clip-card-before)">
    <rect x="40" y="30" width="460" height="84" fill="url(#g-header-before)"/>
  </g>
  <text x="270" y="83" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">⏳  Today</text>

  <g font-size="21" fill="#7F1D1D" font-weight="500">
    <text x="78" y="170">📂   47 fragmented portals</text>
    <text x="78" y="216">📅   28-day decisions</text>
    <text x="78" y="262">🚫   No identity federation</text>
    <text x="78" y="308">🗣️   Partial language coverage</text>
    <text x="78" y="354">♿   Accessibility gaps</text>
    <text x="78" y="400">🧩   Conflicting DPA rules</text>
  </g>

  <!-- ARROW CAPSULE in the middle -->
  <line x1="510" y1="230" x2="544" y2="230" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
  <g filter="url(#shadow-sm)">
    <rect x="544" y="198" width="112" height="64" rx="32" fill="url(#g-arrow)"/>
  </g>
  <text x="600" y="238" text-anchor="middle" font-size="22" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">UDCSP</text>
  <line x1="656" y1="230" x2="690" y2="230" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>
  <polygon points="688,219 706,230 688,241" fill="#00897B"/>

  <!-- AFTER CARD -->
  <g filter="url(#shadow)">
    <rect x="700" y="30" width="460" height="400" rx="28" fill="url(#g-after)" stroke="#2E7D32" stroke-width="2"/>
  </g>
  <g clip-path="url(#clip-card-after)">
    <rect x="700" y="30" width="460" height="84" fill="url(#g-header-after)"/>
  </g>
  <text x="930" y="83" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">🚀  UDCSP Tomorrow</text>

  <g font-size="21" fill="#1B5E20" font-weight="500">
    <text x="738" y="170">🏛️   1 federated platform · 3 zones</text>
    <text x="738" y="216">📅   4-day decisions</text>
    <text x="738" y="262">🔐   2.1 M citizens federated</text>
    <text x="738" y="308">🗣️   12 languages · native parity</text>
    <text x="738" y="354">♿   WCAG 2.1 AA throughout</text>
    <text x="738" y="400">🤖   AI-assisted at every step</text>
  </g>
</svg>
