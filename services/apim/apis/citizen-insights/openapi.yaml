openapi: 3.0.3
info:
  title: Citizen Insights API
  version: 1.0.0
  description: |
    Read-only insight endpoints powering the lightweight HTML/SVG widgets
    embedded in the citizen web portal (application status chart, processing
    time indicator, language satisfaction trend). Replaces the historical
    Power BI Embedded surface for citizen-facing dashboards.
servers:
  - url: https://{gateway-host}/citizen/insights
paths:
  /{type}:
    get:
      summary: Fetch a citizen-scoped insight payload by type
      operationId: get-citizen-insights-by-type
      parameters:
        - name: type
          in: path
          required: true
          description: Insight identifier (application-status, processing-time, language-satisfaction)
          schema:
            type: string
            enum: [application-status, processing-time, language-satisfaction]
        - name: citizenId
          in: query
          required: false
          schema: { type: string }
        - name: country
          in: query
          required: false
          schema: { type: string, enum: [DK, SE, NO] }
        - name: locale
          in: query
          required: false
          schema: { type: string }
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Insight payload (shape depends on type)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '404': { description: Unknown insight type }
        '429': { description: Too many requests }
components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Response:
      type: object
      additionalProperties: true
      properties:
        correlationId: { type: string }
