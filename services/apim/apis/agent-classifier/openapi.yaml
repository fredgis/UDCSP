openapi: 3.0.3
info:
  title: Foundry Classifier Agent API
  version: 1.0.0
servers:
  - url: https://{gateway-host}/internal/agents/classifier
paths:
  /classify:
    post:
      summary: Classify citizen request
      operationId: post-agent-classifier-classify
      parameters:
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Request" }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
  /health:
    get:
      summary: Health check
      operationId: get-agent-classifier-health
      parameters:
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Request: { type: object, additionalProperties: true }
    Response:
      type: object
      properties:
        correlationId: { type: string }
        status: { type: string }
