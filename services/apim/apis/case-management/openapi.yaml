openapi: 3.0.3
info:
  title: Case Management API
  version: 1.0.0
servers:
  - url: https://{gateway-host}/cases
paths:
  /cases:
    get:
      summary: List cases visible to the caller (caseworker queue or citizen "my cases")
      operationId: get-case-management-cases
      parameters:
        - name: mine
          in: query
          required: false
          schema: { type: boolean }
          description: When true, scope to the authenticated citizen
        - name: citizenId
          in: query
          required: false
          schema: { type: string }
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
    post:
      summary: Create D365 case
      operationId: post-case-management-cases
      parameters:
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Request" }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
  /cases/{caseId}:
    get:
      summary: Read D365 OData case
      operationId: get-case-management-cases-caseId
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Request: { type: object, additionalProperties: true }
    Response:
      type: object
      properties:
        correlationId: { type: string }
        status: { type: string }
