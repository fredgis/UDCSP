openapi: 3.0.3
info:
  title: Citizen Applications API
  version: 1.0.0
servers:
  - url: https://{gateway-host}/citizen/applications
paths:
  /:
    post:
      summary: Submit citizen application
      operationId: post-citizen-applications-submit
      parameters:
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Request" }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
    get:
      summary: List applications visible to the caller
      operationId: get-citizen-applications-list
      parameters:
        - name: x-correlation-id
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
  /{applicationId}:
    get:
      summary: Get application status
      operationId: get-citizen-applications-by-id
      parameters:
        - name: applicationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Response" }
        '401': { description: Unauthorized }
        '429': { description: Too many requests }
    delete:
      summary: Delete the citizen's own application (Dataverse row)
      operationId: delete-citizen-applications-by-id
      parameters:
        - name: applicationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '403': { description: Not owner }
        '404': { description: Not found }
components:
  securitySchemes:
    bearer: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Request: { type: object, additionalProperties: true }
    Response:
      type: object
      properties:
        correlationId: { type: string }
        status: { type: string }
